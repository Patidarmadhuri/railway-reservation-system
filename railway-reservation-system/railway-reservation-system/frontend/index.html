<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Online Railway Reservation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
  <div class="container py-4">
    <h1 class="mb-4">Zug‑Reservierungssystem</h1>
    <div id="search-section">
      <h2>Züge suchen</h2>
      <form id="searchForm" class="row g-3">
        <div class="col-md-3">
          <label for="origin" class="form-label">Start</label>
          <input type="text" class="form-control" id="origin" required>
        </div>
        <div class="col-md-3">
          <label for="destination" class="form-label">Ziel</label>
          <input type="text" class="form-control" id="destination" required>
        </div>
        <div class="col-md-3">
          <label for="date" class="form-label">Datum</label>
          <input type="date" class="form-control" id="date" required>
        </div>
        <div class="col-md-3 d-flex align-items-end">
          <button type="submit" class="btn btn-primary">Suchen</button>
        </div>
      </form>
      <div id="trainResults" class="mt-4"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
